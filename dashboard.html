<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Full CX — Mutant Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8fafc;--bg2:#f1f5f9;--bg3:#ffffff;--card:rgba(0,0,0,0.02);--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.12);--text:#1e293b;--muted:#64748b;--orange:#f97316;--yellow:#eab308;--red:#ef4444;--green:#10b981;--blue:#3b82f6;--purple:#8b5cf6;--pink:#ec4899}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Header */
header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#ffffff 0%,#f8fafc 50%,#f1f5f9 100%);border-bottom:1px solid var(--border2);padding:16px 24px;backdrop-filter:blur(20px)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-title{font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--blue),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;color:var(--red)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse-dot 2s infinite}
.filters{display:flex;gap:6px}
.fbtn{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.fbtn:hover{background:rgba(0,0,0,.03);color:var(--text)}
.fbtn.active{background:var(--purple);color:#1e293b;border-color:var(--purple);box-shadow:0 4px 15px rgba(139,92,246,.3)}

/* KPIs */
.kpi-grid{max-width:1400px;margin:20px auto;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;padding:0 24px}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
.kpi{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;transition:.3s;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
.kpi:hover{transform:translateY(-2px);background:rgba(0,0,0,.02);box-shadow:0 8px 25px rgba(0,0,0,.3)}
.kpi-icon{font-size:20px;margin-bottom:4px}
.kpi-val{font-size:32px;font-weight:900;line-height:1}
.kpi-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.kpi-sub{font-size:10px;color:rgba(148,163,184,.6);margin-top:2px}

/* Container */
.container{max-width:1400px;margin:0 auto;padding:0 24px 40px}

/* Section titles */
.stitle{font-size:15px;font-weight:800;margin:28px 0 14px;display:flex;align-items:center;gap:8px;letter-spacing:.5px}

/* Vision cards */
.visao-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:900px){.visao-grid{grid-template-columns:1fr}}
.visao-card{border-radius:16px;padding:20px;border:1px solid;transition:.3s}
.visao-card:hover{transform:translateY(-2px)}
.visao-num{font-size:3rem;font-weight:900;line-height:1}
.visao-title{font-size:14px;font-weight:800;margin-top:6px;text-transform:uppercase;letter-spacing:1px}
.visao-detail{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}

/* Urgent actions */
.urgent-box{border:2px solid rgba(239,68,68,.4);border-radius:16px;padding:20px;margin-bottom:24px;background:rgba(239,68,68,.03);animation:pulse-border 2.5s infinite}
.acao-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(max-width:900px){.acao-grid{grid-template-columns:1fr}}
.acao-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;transition:.3s}
.acao-card:hover{background:rgba(0,0,0,.02);border-color:var(--border2);transform:translateY(-1px)}
.acao-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.acao-nome{font-size:14px;font-weight:800;color:#1e293b}
.badge{font-size:9px;padding:3px 8px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-neg{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.3)}
.badge-qual{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3)}
.badge-pros{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.badge-exec{font-size:10px;color:var(--muted);font-weight:600}
.acao-status{font-size:11px;color:var(--muted);line-height:1.5;margin-top:4px}
.acao-date{font-size:10px;font-weight:700;margin-top:8px;display:inline-block;padding:3px 10px;border-radius:6px}
.date-hoje{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.date-amanha{background:rgba(139,92,246,.15);color:var(--purple);border:1px solid rgba(139,92,246,.3)}
.date-semana{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}

/* Temp tags */
.temp{font-size:10px;padding:3px 10px;border-radius:5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.t-quente{background:rgba(249,115,22,.2);color:var(--orange);border:1px solid rgba(249,115,22,.3)}
.t-morno{background:rgba(234,179,8,.15);color:var(--yellow);border:1px solid rgba(234,179,8,.3)}
.t-plano{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}

/* Table */
.table-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px}
.table-header{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.table-header h3{font-size:14px;font-weight:800}
.table-count{font-size:11px;background:var(--purple);color:#1e293b;padding:3px 10px;border-radius:20px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:rgba(0,0,0,.02)}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
td{padding:12px 14px;border-bottom:1px solid rgba(0,0,0,.02)}
tr{transition:.2s}
tr:hover{background:rgba(0,0,0,.01)}
.td-name{font-weight:800;color:#1e293b;font-size:13px}

/* Attack grid */
.attack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:24px}
.attack-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;transition:.3s;cursor:pointer}
.attack-card:hover{background:rgba(59,130,246,.08);border-color:var(--blue);transform:scale(1.03);box-shadow:0 4px 15px rgba(59,130,246,.15)}
.attack-name{font-size:12px;font-weight:800;color:#1e293b}
.attack-sub{font-size:9px;color:var(--muted);margin-top:2px}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:28px;width:500px;max-width:90vw;box-shadow:0 25px 60px rgba(0,0,0,.2)}
.modal h3{font-size:18px;font-weight:800;color:#1e293b;margin-bottom:4px}
.modal-empresa{font-size:13px;color:#64748b;margin-bottom:20px}
.modal label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;margin-top:14px}
.modal textarea,.modal input,.modal select{width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:13px;font-family:inherit;color:#1e293b;outline:none;transition:.2s;background:#f8fafc}
.modal textarea:focus,.modal input:focus,.modal select:focus{border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.1)}
.modal textarea{height:80px;resize:vertical}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-btn{padding:10px 20px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
.modal-btn-save{background:#8b5cf6;color:#fff}
.modal-btn-save:hover{background:#7c3aed;box-shadow:0 4px 12px rgba(139,92,246,.3)}
.modal-btn-cancel{background:#f1f5f9;color:#64748b}
.modal-btn-cancel:hover{background:#e2e8f0}
.edit-btn{width:28px;height:28px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;justify-content:center;transition:.2s;color:#94a3b8}
.edit-btn:hover{background:#8b5cf6;color:#fff;border-color:#8b5cf6;transform:scale(1.1)}

/* Exec cards */
.exec-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px}
.exec-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:16px;transition:.3s}
.exec-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.exec-name{font-size:14px;font-weight:800;color:#1e293b;margin-bottom:6px}
.exec-stats{font-size:11px;color:var(--muted)}
.exec-bar{height:6px;background:rgba(0,0,0,.03);border-radius:3px;margin-top:10px;overflow:hidden;display:flex}
.exec-seg{height:100%}

/* Timeline */
.timeline{position:relative;padding-left:30px;margin-bottom:24px}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--purple),var(--blue),transparent)}
.tl-entry{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-24px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid}
.tl-date{font-size:12px;font-weight:800;margin-bottom:6px}
.tl-chips{display:flex;flex-wrap:wrap;gap:4px}
.tl-chip{font-size:10px;padding:3px 10px;border-radius:6px;font-weight:700;background:rgba(0,0,0,.03);color:var(--text);border:1px solid var(--border)}

/* Animations */
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
@keyframes pulse-border{0%,100%{border-color:rgba(239,68,68,.3)}50%{border-color:rgba(239,68,68,.7)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s ease forwards;opacity:0}
</style>
</head>
<body>

<header>
<div class="header-inner">
<div>
<div class="header-title">Pipeline Full CX — Gestão à Vista</div>
<div class="header-sub">Head of Sales: Thiago Paretti · Mutant · Atualizado 06/04/2026</div>
</div>
<div style="display:flex;align-items:center;gap:12px">
<span class="live-badge"><span class="live-dot"></span>AO VIVO</span>
<div class="filters">
<button class="fbtn active" onclick="setFilter('all',this)">📊 Todos</button>
<button class="fbtn" onclick="setFilter('quente',this)">🔥 Quentes</button>
<button class="fbtn" onclick="setFilter('morno',this)">☀️ Mornos</button>
<button class="fbtn" onclick="setFilter('plano',this)">🎯 Ataque</button>
</div>
</div>
</div>
</header>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal">
<div class="modal">
<h3>Editar Deal</h3>
<div class="modal-empresa" id="modalEmpresa"></div>
<label>Status</label>
<textarea id="modalStatus"></textarea>
<label>Próxima Ação (data)</label>
<input type="text" id="modalProx" placeholder="dd/mm">
<label>Temperatura</label>
<select id="modalTemp">
<option value="quente">🔥 Quente</option>
<option value="morno">☀️ Morno</option>
<option value="plano">🎯 Plano Ataque</option>
</select>
<label>Fase</label>
<select id="modalFase">
<option value="Prospect">Prospect</option>
<option value="Qualification">Qualification</option>
<option value="Negotiation">Negotiation</option>
<option value="Proposal">Proposal</option>
</select>
<div class="modal-btns">
<button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancelar</button>
<button class="modal-btn modal-btn-save" onclick="saveEdit()">Salvar</button>
</div>
</div>
</div>

<div class="kpi-grid" id="kpis"></div>
<div class="container">
<div id="visao"></div>
<div id="urgente"></div>
<div id="timeline"></div>
<div id="tabela"></div>
<div id="ataque"></div>
<div id="execs"></div>
</div>

<script>
var D=[
{n:"AEGEA",f:"Prospect",e:"Simone Torelli",t:"quente",p:"Full Atendimento",s:"Duvidas retornou 30/03 - Proposta 03/04",d:"07/04"},
{n:"CASAS BAHIA",f:"Negotiation",e:"Simone Torelli",t:"quente",p:"Full Atendimento",s:"Proposta RFP enviada 02/04. Agenda 06/04 para POC IAM",d:"06/04"},
{n:"COGNA",f:"Qualification",e:"Raquel Lopes",t:"quente",p:"Jornada Retenção",s:"Thiago na liderança, tratativas com Rouman. Reunião Sarah e Raphael modelo de negócio",d:"06/04"},
{n:"ITURAN",f:"Prospect",e:"Fernando Araujo",t:"quente",p:"Full Atendimento",s:"Reunião CTO agendada 07/04 para apresentar IAM",d:"07/04"},
{n:"MOVIDA",f:"Prospect",e:"Simone Torelli",t:"quente",p:"Full Atendimento",s:"Reunião 02/04 realizada. Responder análise por saída ATH. Abrir URA DTMF + IAM cancelamento",d:"07/04"},
{n:"TOO SEGUROS",f:"Negotiation",e:"Paretti",t:"quente",p:"Full Atendimento",s:"Pegar com Altivo último status e assumir cadência da negociação",d:"06/04",m:"38,9%"},
{n:"YDUQS",f:"Negotiation",e:"Paretti",t:"quente",p:"Cancelamento",s:"Simulador formalizado pro Jucie 02/04. FUP 06/04 garantir ok e seguir com compras",d:"06/04",m:"37,8%"},
{n:"ALELO",f:"Prospect",e:"Raquel Lopes",t:"morno",p:"Full Atendimento",s:"Mudança de estrutura, Julio sai do circuito",d:"13/04"},
{n:"CIELO",f:"Prospect",e:"Simone Torelli",t:"morno",p:"Full Atendimento",s:"Presencial com COO Edu Lemos em 13/04",d:"13/04"},
{n:"RODOBENS",f:"Prospect",e:"Raquel Lopes",t:"morno",p:"Full Outsourcing",s:"Reunião com Dani, falta passar multa",d:"08/04"},
{n:"GOL",f:"Prospect",e:"Cezar Magalhães",t:"morno",p:"Full Atendimento",s:"Saída do Posi, marcar com Marcos Faria ASAP",d:"07/04"},
{n:"PREVENT SENIOR",f:"Prospect",e:"Fernando Araujo",t:"morno",p:"Full Atendimento",s:"FUP apresentação 16/03, aguardar retorno",d:"07/04"},
{n:"VIBRA",f:"Prospect",e:"Cezar Magalhães",t:"morno",p:"Full Atendimento",s:"Reunião agendada 08/04",d:"08/04"},
{n:"TELEFONICA",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda e abrir oportunidade",d:"09/04"},
{n:"CRUZEIRO DO SUL",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"HAPVIDA NDI",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"RIACHUELO",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"SEM PARAR",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"ANIMA EDUCAÇÃO",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"BANCO PAN",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"TENDA",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"AZUL",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"CNU",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"99APP",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"LOCALIZA",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"ARCO EDUCAÇÃO",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"ZE DELIVERY",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"SIMPALA",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"MARY KAY",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"VERISURE",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"VIASAT",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"UNIDAS",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"},
{n:"GOL (Full)",f:"Prospect",e:"Paretti",t:"plano",p:"Full Atendimento",s:"Marcar agenda",d:"09/04"}
];

// Cloud sync
var CLOUD='https://jsonblob.com/api/jsonBlob/019d6468-a1b2-7890-abcd-pipeline00001';
var cloudReady=false;
// Create cloud storage
fetch('https://jsonblob.com/api/jsonBlob',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({edits:{}})})
.then(r=>{var loc=r.headers.get('Location')||r.headers.get('location');if(loc)CLOUD=loc;cloudReady=true;loadEdits()})
.catch(()=>{});

// Load saved edits from cloud or localStorage
var savedEdits={};
try{savedEdits=JSON.parse(localStorage.getItem('pipeline_edits')||'{}');}catch(e){}
function applyEdits(){Object.keys(savedEdits).forEach(i=>{var e=savedEdits[i];if(D[i]){if(e.s)D[i].s=e.s;if(e.d)D[i].d=e.d;if(e.t)D[i].t=e.t;if(e.f)D[i].f=e.f}})}
function saveEdits(){localStorage.setItem('pipeline_edits',JSON.stringify(savedEdits));if(cloudReady)fetch(CLOUD,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({edits:savedEdits})}).catch(()=>{})}
function loadEdits(){if(cloudReady)fetch(CLOUD).then(r=>r.json()).then(d=>{if(d&&d.edits&&Object.keys(d.edits).length>0){savedEdits=d.edits;localStorage.setItem('pipeline_edits',JSON.stringify(savedEdits));applyEdits();render()}}).catch(()=>{})}
applyEdits();

// Edit modal
var editIdx=-1;
function openEdit(i){editIdx=i;var d=D[i];document.getElementById('modalEmpresa').textContent=d.n+' — '+d.e;document.getElementById('modalStatus').value=d.s;document.getElementById('modalProx').value=d.d;document.getElementById('modalTemp').value=d.t;document.getElementById('modalFase').value=d.f;document.getElementById('editModal').classList.add('show')}
function closeModal(){document.getElementById('editModal').classList.remove('show');editIdx=-1}
function saveEdit(){if(editIdx<0)return;D[editIdx].s=document.getElementById('modalStatus').value;D[editIdx].d=document.getElementById('modalProx').value;D[editIdx].t=document.getElementById('modalTemp').value;D[editIdx].f=document.getElementById('modalFase').value;savedEdits[editIdx]={s:D[editIdx].s,d:D[editIdx].d,t:D[editIdx].t,f:D[editIdx].f};saveEdits();closeModal();render()}
document.getElementById('editModal').addEventListener('click',function(e){if(e.target===this)closeModal()});

var F='all';
function setFilter(f,el){F=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));el.classList.add('active');render()}
function fd(){return F==='all'?D:D.filter(d=>d.t===F)}

function render(){
var all=D,f=fd();
var q=all.filter(d=>d.t==='quente'),m=all.filter(d=>d.t==='morno'),p=all.filter(d=>d.t==='plano');
var neg=all.filter(d=>d.f==='Negotiation'),hoje=all.filter(d=>d.d==='06/04'),amanha=all.filter(d=>d.d==='07/04');

// KPIs
document.getElementById('kpis').innerHTML=[
['📊',all.length,'Total Pipeline','deals ativos','var(--purple)'],
['🔥',q.length,'Quentes','prioridade máxima','var(--orange)'],
['☀️',m.length,'Mornos','acompanhamento','var(--yellow)'],
['🎯',p.length,'Plano Ataque','abrir oportunidade','var(--blue)'],
['⚡',hoje.length,'Ações Hoje','06/04/2026','var(--red)'],
['📅',amanha.length,'Amanhã','07/04/2026','var(--purple)']
].map((k,i)=>'<div class="kpi fade-in" style="animation-delay:'+i*.05+'s"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+k[4]+';border-radius:14px 14px 0 0"></div><div class="kpi-icon">'+k[0]+'</div><div class="kpi-val" style="color:'+k[4]+'">'+k[1]+'</div><div class="kpi-label">'+k[2]+'</div><div class="kpi-sub">'+k[3]+'</div></div>').join('');

// Visão cards
document.getElementById('visao').innerHTML='<div class="stitle">📈 Visão Geral</div><div class="visao-grid">'+
'<div class="visao-card" style="background:linear-gradient(135deg,rgba(249,115,22,.1),rgba(249,115,22,.02));border-color:rgba(249,115,22,.3)"><div class="visao-num" style="color:var(--orange)">'+q.length+'</div><div class="visao-title" style="color:var(--orange)">Deals Quentes</div><div class="visao-detail">'+q.map(d=>d.n).join(' · ')+'</div></div>'+
'<div class="visao-card" style="background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(16,185,129,.02));border-color:rgba(16,185,129,.3)"><div class="visao-num" style="color:var(--green)">'+neg.length+'</div><div class="visao-title" style="color:var(--green)">Em Negociação</div><div class="visao-detail">'+neg.map(d=>d.n+(d.m?' ('+d.m+')':'')).join(' · ')+'</div></div>'+
'<div class="visao-card" style="background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.02));border-color:rgba(239,68,68,.3)"><div class="visao-num" style="color:var(--red)">'+hoje.length+'</div><div class="visao-title" style="color:var(--red)">Ações Hoje</div><div class="visao-detail">'+hoje.map(d=>d.n).join(' · ')+'</div></div>'+
'</div>';

// Urgent actions
var urgents=f.filter(d=>d.d==='06/04'||d.d==='07/04');
if(urgents.length>0){
var bmap={Negotiation:'badge-neg',Qualification:'badge-qual',Prospect:'badge-pros'};
document.getElementById('urgente').innerHTML='<div class="stitle">⚡ Ações Urgentes</div><div class="urgent-box"><div class="acao-grid">'+
urgents.map(d=>{
var dc=d.d==='06/04'?'date-hoje':'date-amanha';
var dl=d.d==='06/04'?'HOJE':'AMANHÃ';
var idx=D.indexOf(d);
return '<div class="acao-card"><div class="acao-top"><div class="acao-nome">'+d.n+'</div><div style="display:flex;gap:6px;align-items:center"><span class="badge '+(bmap[d.f]||'badge-pros')+'">'+d.f+'</span><button class="edit-btn" onclick="openEdit('+idx+')" title="Editar">&#9998;</button></div></div><div class="badge-exec">'+d.e+(d.m?' · Margem: '+d.m:'')+'</div><div class="acao-status">'+d.s+'</div><span class="acao-date '+dc+'">'+dl+' — '+d.d+'</span></div>'}).join('')+
'</div></div>';
}else{document.getElementById('urgente').innerHTML=''}

// Timeline
var dates={};f.forEach(d=>{if(!dates[d.d])dates[d.d]=[];dates[d.d].push(d)});
var sd=Object.keys(dates).sort((a,b)=>{var pa=a.split('/'),pb=b.split('/');return(+pa[1]*100+ +pa[0])-(+pb[1]*100+ +pb[0])});
var colors={'06/04':'var(--red)','07/04':'var(--purple)','08/04':'var(--blue)','09/04':'var(--blue)'};
document.getElementById('timeline').innerHTML='<div class="stitle">📋 Timeline de Ações</div><div class="timeline">'+
sd.map(dt=>{
var c=colors[dt]||'var(--muted)';
var isHoje=dt==='06/04';
return '<div class="tl-entry"><div class="tl-dot" style="border-color:'+c+';background:'+(isHoje?c:'var(--bg)')+'"></div><div class="tl-date" style="color:'+c+'">'+dt+(isHoje?' — HOJE':'')+'</div><div class="tl-chips">'+
dates[dt].map(d=>{var tc=d.t==='quente'?'rgba(249,115,22,.15)':d.t==='morno'?'rgba(234,179,8,.1)':'rgba(59,130,246,.1)';var bc=d.t==='quente'?'rgba(249,115,22,.3)':d.t==='morno'?'rgba(234,179,8,.2)':'rgba(59,130,246,.2)';return '<span class="tl-chip" style="background:'+tc+';border-color:'+bc+'">'+d.n+'</span>'}).join('')+
'</div></div>'}).join('')+'</div>';

// Table (quentes + mornos)
var tableDeals=f.filter(d=>d.t!=='plano');
if(tableDeals.length>0){
document.getElementById('tabela').innerHTML='<div class="stitle">📊 Deals Ativos</div><div class="table-wrap"><div class="table-header"><h3>Pipeline Quente + Morno</h3><span class="table-count">'+tableDeals.length+' deals</span></div><table><thead><tr><th>Empresa</th><th>Fase</th><th>Executivo</th><th>Temp.</th><th>Projeto</th><th>Status</th><th>Próx Ação</th><th></th></tr></thead><tbody>'+
tableDeals.map(d=>{
var idx=D.indexOf(d);
var tc=d.t==='quente'?'t-quente':'t-morno';
var tl=d.t==='quente'?'QUENTE':'MORNO';
var dc=d.d==='06/04'?'date-hoje':d.d==='07/04'?'date-amanha':'date-semana';
return '<tr><td class="td-name">'+d.n+'</td><td>'+d.f+'</td><td>'+d.e+'</td><td><span class="temp '+tc+'">'+tl+'</span></td><td style="font-size:11px">'+d.p+'</td><td style="font-size:11px;max-width:280px">'+d.s+'</td><td><span class="acao-date '+dc+'">'+d.d+'</span></td><td><button class="edit-btn" onclick="openEdit('+idx+')" title="Editar">&#9998;</button></td></tr>'}).join('')+
'</tbody></table></div>';
}else{document.getElementById('tabela').innerHTML=''}

// Attack grid
var attacks=f.filter(d=>d.t==='plano');
if(attacks.length>0){
document.getElementById('ataque').innerHTML='<div class="stitle">🎯 Plano de Ataque — '+attacks.length+' empresas</div><div class="attack-grid">'+
attacks.map((d,i)=>'<div class="attack-card fade-in" style="animation-delay:'+i*.03+'s"><div class="attack-name">'+d.n+'</div><div class="attack-sub">Marcar agenda · 09/04</div></div>').join('')+'</div>';
}else{document.getElementById('ataque').innerHTML=''}

// Exec summary
var execs={};all.forEach(d=>{if(!execs[d.e])execs[d.e]={t:0,q:0,m:0,p:0};execs[d.e].t++;execs[d.e][d.t[0]]++});
document.getElementById('execs').innerHTML='<div class="stitle">👥 Por Executivo</div><div class="exec-grid">'+
Object.keys(execs).sort((a,b)=>execs[b].q-execs[a].q).map(name=>{
var e=execs[name];
var pq=e.t?e.q/e.t*100:0,pm=e.t?e.m/e.t*100:0,pp=e.t?e.p/e.t*100:0;
return '<div class="exec-card"><div class="exec-name">'+name+'</div><div class="exec-stats"><span style="color:var(--orange)">'+e.q+' quentes</span> · <span style="color:var(--yellow)">'+e.m+' mornos</span> · <span style="color:var(--blue)">'+e.p+' ataque</span></div><div class="exec-bar"><div class="exec-seg" style="width:'+pq+'%;background:var(--orange)"></div><div class="exec-seg" style="width:'+pm+'%;background:var(--yellow)"></div><div class="exec-seg" style="width:'+pp+'%;background:var(--blue)"></div></div></div>'}).join('')+'</div>';
}
render();
</script>
</body>
</html>
